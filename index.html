  //==== Utility: Date Formatting ====
function formatDate(input) {
  const date = new Date(input);
  return isNaN(date) ? 'NA' : date.toLocaleString('en-GB');
}

//==== IndexedDB storage layer ====
const IDB_NAME = 'ibraDB';
// NOTE: never lower this number again - a browser that has already opened
// the DB at a higher version (e.g. during earlier testing) will throw
// VersionError if a page later requests a lower version. Always bump forward.
const IDB_VERSION = 3;
let idbPromise;

function openDB() {
  if (idbPromise) return idbPromise;
  idbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains('addbook')) {
        const store = db.createObjectStore('addbook', { keyPath: 'id' });
        store.createIndex('area', 'area');
        store.createIndex('srno', 'srno');
        store.createIndex('name', 'name');
      }
      if (!db.objectStoreNames.contains('meta')) {
        db.createObjectStore('meta');
      }
      // Note: 'photos' and 'photoBlobs' stores may exist from earlier testing
      // (photoid now lives directly on each addbook record instead).
      // They're unused now and harmless to leave in place.
    };
    req.onblocked = () => {
      // Another tab still has an older-version connection open, so the
      // upgrade can't proceed. Fail loudly instead of hanging forever.
      console.error('IndexedDB upgrade blocked - close other open tabs of this app and reload.');
      reject(new Error('IndexedDB upgrade blocked by another open tab'));
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return idbPromise;
}

async function idbPutAll(storeName, items) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    store.clear();
    let skipped = 0;
    items.forEach(item => {
      try {
        store.put(item);
      } catch (err) {
        // e.g. invalid key (NaN, undefined, etc) from a malformed source row -
        // skip just this record instead of aborting every record after it
        skipped++;
        console.warn(`Skipped invalid record in "${storeName}":`, item, err);
      }
    });
    if (skipped > 0) {
      console.warn(`${storeName}: skipped ${skipped} of ${items.length} record(s) due to invalid data`);
    }
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function idbGetAll(storeName) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function idbSetMeta(key, value) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('meta', 'readwrite');
    tx.objectStore('meta').put(value, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function idbGetMeta(key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('meta', 'readonly');
    const req = tx.objectStore('meta').get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

//==== Fetch Data Functions ====
async function fetchJson(url) {
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error(`Fetch failed: ${url}`);
  return await res.json();
}
async function fetchLatestTimestamp() {
  const url = 'https://script.google.com/macros/s/AKfycbwo-TtPn3DAjHSPCXDwPFerT36QyfPPvUTi7uQEvcmjJso_aWpaKefUsgx_vpJOowHUgg/exec?sheetid=1MaB1PMP3ouY3Es5ziLgY7dhT3ZSb6oHRgecw3JiJfGw&sheetname=Sheet1';
  const res = await fetch(url, { cache: 'no-store' });
  const text = (await res.text()).trim();
  // Handle [[timestamp]] case
  try {
    const parsed = JSON.parse(text);
    return Array.isArray(parsed) ? parsed.flat(Infinity)[0] : parsed;
  } catch {
    return text;
  }
}
async function fetchAddBookData() {
  const url = 'https://script.google.com/macros/s/AKfycbwIVAlRrCTt6z_Ej4W6PHhopFqCq1JvEsSoN2RPqgWY7VXLW0P2pteA1jgVFaWePc2S/exec';
  let data = await fetchJson(url);
  data.shift(); // remove header
  let formatted = data.map(([id, name, add1, add2, add3, district, place, pincode, fixed, mobile1, mobile2, state, email, srno, sbac, doj, dor, spname, area, blank1, dob, fampen, pensionbr, scanned, newempid, dod, photoid, blank3, blank4]) => ({
    id: Number(id), name, add1, add2, add3, district, place, pincode, fixed, mobile1, mobile2, state, email, srno, sbac,
    doj: ddmmyy(doj), dor: ddmmyy(dor), spname, area, blank1, dob: ddmmyy(dob), fampen, pensionbr, scanned, newempid, dod: ddmmyy(dod),
    photoid, blank3, blank4
  }));
  const totalBefore = formatted.length;
  formatted = formatted.filter(r => !isNaN(r.id));
  if (formatted.length < totalBefore) {
    console.warn(`addbook: dropped ${totalBefore - formatted.length} row(s) with invalid/blank id out of ${totalBefore}`);
  }
  await idbPutAll('addbook', formatted);
  return formatted;
}

// One-time migration for users still on the old version, which stored the
// timestamp in localStorage and the actual data in the Cache API. Runs once,
// flagged in IndexedDB so it never repeats, and stops touching localStorage
// or the old cache entirely from then on. Migrating the cached data (not just
// the timestamp) means upgrading users see their existing data immediately
// instead of a brief "waiting for server" empty state.
const LEGACY_MIGRATION_FLAG = 'migratedFromLocalStorage_v1';
const LEGACY_CACHE_NAME = 'addbook';

async function migrateLegacyStorage() {
  try {
    const alreadyMigrated = await idbGetMeta(LEGACY_MIGRATION_FLAG);
    if (alreadyMigrated) return;
  } catch (err) {
    console.warn('Could not check migration flag, proceeding cautiously:', err);
  }

  // 1. Migrate the timestamp from localStorage
  try {
    const legacyTimestamp = localStorage.getItem('data_updated_at');
    if (legacyTimestamp) {
      const existing = await idbGetMeta('data_updated_at');
      if (!existing) {
        await idbSetMeta('data_updated_at', legacyTimestamp);
        console.log('Migrated data_updated_at from localStorage to IndexedDB');
      }
      localStorage.removeItem('data_updated_at');
    }
  } catch (err) {
    // localStorage may be unavailable (private browsing etc) - safe to skip
    console.warn('Legacy localStorage migration skipped:', err);
  }

  // 2. Migrate the actual records from the old Cache API storage, so
  //    upgrading users get an instant report instead of an empty state
  //    while waiting for the network fetch to complete. (Note: this old
  //    cached data predates the photoid column, so photos won't show until
  //    the next background refresh pulls the updated addbook rows - that's
  //    expected and harmless.)
  try {
    const existingAddbook = await idbGetAll('addbook');
    if ((!existingAddbook || !existingAddbook.length) && 'caches' in window) {
      const cache = await caches.open(LEGACY_CACHE_NAME);

      const addbookResp = await cache.match('/custom/addbookdata.json');
      if (addbookResp && addbookResp.ok) {
        const oldAddbook = await addbookResp.json();
        if (Array.isArray(oldAddbook) && oldAddbook.length) {
          // Ensure ids are normalized to Number for consistent IndexedDB keys,
          // and drop any row with an invalid/blank id (would otherwise abort
          // the whole batch when idbPutAll tries to write it)
          const normalized = oldAddbook.map(r => ({ ...r, id: Number(r.id) })).filter(r => !isNaN(r.id));
          await idbPutAll('addbook', normalized);
          console.log('Migrated', normalized.length, 'addbook records from Cache API to IndexedDB');
        }
      }

      // Clean up the old cache now that its contents have been migrated
      await caches.delete(LEGACY_CACHE_NAME);
    }
  } catch (err) {
    console.warn('Legacy Cache API migration skipped:', err);
  }

  await idbSetMeta(LEGACY_MIGRATION_FLAG, true);
}

async function initReport() {
  await migrateLegacyStorage();

  // 1. Try IndexedDB first (instant report)
  let addBookData = await idbGetAll('addbook');

  let localTimestamp = await idbGetMeta("data_updated_at");

  if (addBookData && addBookData.length && localTimestamp) {
    showReport(addBookData, "Saved & Latest", localTimestamp);
  } else {
    document.getElementById("DataLoadedFrom").textContent = "No cache, waiting for server...";
  }

  // 2. In background, check server timestamp
  try {
    const serverTimestamp = await fetchLatestTimestamp();
    localTimestamp = await idbGetMeta("data_updated_at");

    if (!addBookData.length || localTimestamp != serverTimestamp) {

      // 👉 Show modal ONLY if timestamps differ (and not first load)
      if (localTimestamp && localTimestamp != serverTimestamp) {
       // showUpdateModal("Latest Data Loaded❗ ");
      }

      // Fetch fresh if missing or outdated
      addBookData = await fetchAddBookData();

      await idbSetMeta("data_updated_at", serverTimestamp);

      showReport(addBookData, "Server (updated)", serverTimestamp);
      showUpdateModal("📢 Latest Data Loaded ");
      //document.getElementById("loader").style.display="none"
    }

document.getElementById("datadate").style.display="block"
document.getElementById("datadate").innerHTML= new Date().toLocaleString('en-GB', {timeZone: 'Asia/Kolkata'})

  } catch (err) {
    console.error("Background refresh failed", err);
  }
  
}

function processData(addBookData) {
  console.log(addBookData);
  let data = addBookData;

  activeMembers = data.filter(a => a.name !== "").sort((a, b) => a.name.localeCompare(b.name));
  activeMembers.forEach(element => {
    element.IBorEAB = (element.area.substr(-3).toUpperCase() === 'EAB' ? "EAB" : "IB");
    element.pentype = (element.fampen.length > 0 ? "fam" : "ser");
  });

  familyPensioners = activeMembers.filter(a => a.fampen !== "")
    .map(a => ({ id: a.id, name: a.name, fampen: a.fampen, ibeab: a.IBorEAB, photoid: a.photoid }));

  blank = activeMembers.filter(a => a.area === "BLANK")
    .map(a => ({ id: a.id, name: a.name, fampen: a.fampen, ibeab: a.IBorEAB, srno: a.srno, mobile: a.mobile1, photoid: a.photoid }));

  allMembNoWise = activeMembers.map(a => ({
    id: a.id, name: a.name, fampen: a.fampen, ibeab: a.IBorEAB,
    srno: a.srno, mobile: a.mobile1, newempid: a.newempid, photoid: a.photoid
  })).sort((a, b) => a.srno - b.srno);

  allmemb = activeMembers.map(a => ({
    id: a.id, name: a.name, fampen: a.fampen, ibeab: a.IBorEAB,
    srno: a.srno, mobile: a.mobile1, newempid: a.newempid, photoid: a.photoid
  }));

  selectedRegion('allmemb', 0);
}

                toDisplay += `<tr><td colspan=2><b>Region : </b> ${membData[0].area.substr(0, 3)}</td></tr>`;
                toDisplay += `<tr><td colspan=2><b>DOB : </b> ${dob} / <b>DOJ : </b> ${doj} / <b>DOR : </b> ${dor}</td></tr>`;
                toDisplay += `<tr><td colspan=2><b>Spouse Name : </b> ${spname}</td></tr>`;
                document.getElementById("modalData").innerHTML = toDisplay + "</table>";
                document.getElementById("nameHeader").innerHTML = membData[0].name;
                modal.style.display = "block";
                document.getElementById('photo').innerHTML = memphoto;
                if (isMobileDevice) {
                    let msg = `Hi ${membData[0].name} 🙏`;
                msg = encodeURIComponent(msg);
                document.getElementById('whatsapp').innerHTML = `
                <a href="https://wa.me/91${membData[0].mobile1}?text=${msg}" target="_blank">
                <img alt="Chat on WhatsApp" src="images/WhatsApp.jpg" height="50px" />
                </a>`;
                 }
              
                 }

function fiterName() {
                let input = document.getElementById("myInput");
                let filter = input.value.toUpperCase().replaceAll(" ", "");
                let table = document.getElementById("regionTable");
                let tr = table.getElementsByTagName("tr");
                for (let i = 0; i < tr.length; i++) {
                    let td = tr[i].getElementsByTagName("td")[0];
                    if (td) {
                        let txtValue = td.textContent || td.innerText;
                        if (txtValue.toUpperCase().replaceAll(" ", "").indexOf(filter) > -1) {
                            tr[i].style.display = "";
                        } else {
                            tr[i].style.display = "none";
                        }
                    }
                }
            }

            var btnContainer = document.getElementById("regions");
            if (btnContainer) {
                var btns = btnContainer.getElementsByClassName("list");
                for (let i = 0; i < btns.length; i++) {
                    btns[i].addEventListener("click", function () {
                        let current = document.getElementsByClassName("active");
                        if (current[0]) current[0].className = current[0].className.replace(" active", "");
                        this.className += " active";
                    });
                }
            }
         	let details = navigator.userAgent;
            let regexp = /android|iphone|kindle|ipad/i;
            let isMobileDevice = regexp.test(details);
            
            function showUpdateModal(message) {
  const modal = document.getElementById("myModal");
  const header = document.getElementById("nameHeader");
  const content = document.getElementById("modalData");

  header.innerHTML = "<span style='font-size:100px;'>&#9995;</span>";
  content.innerHTML = `<p style="text-align:center;font-size:18px;">${message}</p>`;
  document.getElementById('photo').innerHTML = "";
  document.getElementById('whatsapp').innerHTML = "";

  modal.style.display = "block";

  // Auto close after 3 seconds
  setTimeout(() => {
    modal.style.display = "none";
  }, 3000);
}
</script>
